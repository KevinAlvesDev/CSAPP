{# templates/partials/_comment_error.html #}
<div class="list-group-item list-group-item-action py-1 px-2">
    <div class="d-flex w-100 justify-content-between align-items-center mb-1">
        <div class="d-flex align-items-center gap-2">
            <strong class="mb-0 small text-danger"><i class="bi bi-exclamation-triangle me-1"></i> Erro ao adicionar comentário</strong>
        </div>
        <small class="text-secondary">{{ (datetime.utcnow() | string) if false else '' }}</small>
    </div>
    <div class="comment-content-wrapper">
        <p class="mb-1 small text-danger">{{ message }}</p>
    </div>
</div>

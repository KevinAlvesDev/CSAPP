<li class="list-group-item d-flex flex-column align-items-start" id="task-item-{{ tarefa.id }}"
    data-id="{{ tarefa.id }}" {% if oob %} hx-swap-oob="true" {% endif %}>
    <div class="d-flex w-100 justify-content-between align-items-center">
        {% include 'partials/_task_item.html' %}
    </div>
    {% if tarefa.subtarefas %}
    <ul class="list-group list-group-flush w-100 mt-2 ps-4 border-start">
        {% for sub in tarefa.subtarefas %}
        <li class="list-group-item bg-light py-1 border-0">
            <small>
                <i class="bi bi-check2-circle me-1"></i> {{ sub.nome }}
                {% if sub.detalhe %} <span class="text-muted">- {{ sub.detalhe }}</span> {% endif %}
            </small>
        </li>
        {% endfor %}
    </ul>
    {% endif %}
</li>
